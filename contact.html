	<form class="form" action="https://formspree.io/f/xvzaavle" method="POST">

	<div class="field">
  <input id="name" class="input" name="name" placeholder=" " required minlength="2" pattern="[A-Za-zÀ-ÿ\s\-]+" title="Lettres, espaces et tirets uniquement" autocomplete="name" aria-describedby="name-error" />
  <label for="name">Nom</label>
  <span class="field-error" id="name-error"></span>
</div>

<div class="field">
  <input id="email" class="input" name="email" placeholder=" " type="email" required autocomplete="email" aria-describedby="email-error" />
  <label for="email">Email</label>
  <span class="field-error" id="email-error"></span>
</div>

<div class="field">
  <input id="subject" class="input" name="subject" placeholder=" " required minlength="3" aria-describedby="subject-error" />
  <label for="subject">Sujet</label>
  <span class="field-error" id="subject-error"></span>
</div>

<div class="field">
  <textarea id="message" name="message" placeholder=" " required minlength="10" aria-describedby="message-error"></textarea>
  <label for="message">Message</label>
  <span class="field-error" id="message-error"></span>
</div>

  <!-- anti-spam -->
  <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off">

  <button class="btn primary" type="submit" id="submit-btn">Envoyer</button>
<input type="hidden" name="_next" value="https://joseanthony-dev.github.io/portfolio/contact.html?sent=1">
</form>
<p id="sent" class="note" style="display:none;"><b>Message envoyé ✅</b> Merci, je reviens vers vous rapidement.</p>
<script>
  // Validation messages
  var messages = {
    name: "2 caractères min., lettres et tirets uniquement",
    email: "Adresse email invalide",
    subject: "3 caractères minimum",
    message: "10 caractères minimum"
  };

  document.querySelectorAll(".form .input, .form textarea").forEach(function (input) {
    function validate() {
      var error = document.getElementById(input.id + "-error");
      if (!error) return;
      if (input.value.trim() === "") {
        error.textContent = "";
        error.classList.remove("visible");
      } else if (!input.validity.valid) {
        error.textContent = messages[input.id] || "Champ invalide";
        error.classList.add("visible");
      } else {
        error.textContent = "";
        error.classList.remove("visible");
      }
    }
    input.addEventListener("blur", validate);
    input.addEventListener("input", validate);
  });

  document.querySelector(".form").addEventListener("submit", function (e) {
    var form = this;
    var firstInvalid = form.querySelector(":invalid");
    if (firstInvalid) {
      e.preventDefault();
      form.querySelectorAll(".input, textarea").forEach(function (input) {
        var error = document.getElementById(input.id + "-error");
        if (!error) return;
        if (!input.validity.valid) {
          error.textContent = messages[input.id] || "Champ invalide";
          error.classList.add("visible");
        }
      });
      firstInvalid.focus();
      return;
    }
    var btn = document.getElementById("submit-btn");
    btn.disabled = true;
    btn.textContent = "Envoi en cours\u2026";
    setTimeout(function () { btn.disabled = false; btn.textContent = "Envoyer"; }, 8000);
  });
  if (new URLSearchParams(location.search).get("sent") === "1") {
    document.getElementById("sent").style.display = "block";
  }
</script>
