name: CI — Build, Lint, A11y & Lighthouse

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint JS
        run: npm run lint:js

      - name: Lint CSS
        run: npm run lint:css

      - name: Build (minify CSS & JS)
        run: npm run build

      - name: Check minified files are up to date
        run: |
          git diff --exit-code assets/css/style.min.css assets/js/main.min.js assets/js/components.min.js || {
            echo "::error::Minified files are out of date. Run 'npm run build' and commit."
            exit 1
          }

  html-validate:
    runs-on: ubuntu-latest
    needs: build-and-lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Validate HTML
        run: npm run lint:html

  a11y-test:
    runs-on: ubuntu-latest
    needs: build-and-lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Start local server
        run: python3 -m http.server 8080 &

      - name: Wait for server
        run: sleep 2

      - name: Run pa11y accessibility tests
        run: |
          FAILED=0
          PAGES=(
            "index.html"
            "projets.html"
            "competences.html"
            "experience.html"
            "contact.html"
            "blog.html"
            "en/index.html"
            "en/projects.html"
            "en/skills.html"
            "en/contact.html"
          )
          for page in "${PAGES[@]}"; do
            echo "--- Testing $page ---"
            npx pa11y "http://localhost:8080/$page" --standard WCAG2AA --reporter cli || FAILED=1
          done
          exit $FAILED

  smoke-test:
    runs-on: ubuntu-latest
    needs: build-and-lint
    steps:
      - uses: actions/checkout@v4

      - name: Serve site and check all HTML pages return 200
        run: |
          python3 -m http.server 8080 &
          sleep 1
          FAILED=0
          for file in $(find . -name '*.html' -not -path './node_modules/*'); do
            path="${file#.}"
            url="http://localhost:8080${path}"
            status=$(curl -s -o /dev/null -w '%{http_code}' "$url")
            if [ "$status" != "200" ]; then
              echo "::error::$path returned $status"
              FAILED=1
            else
              echo "OK $path"
            fi
          done
          kill %1 || true
          exit $FAILED

  lighthouse:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: build-and-lint
    steps:
      - uses: actions/checkout@v4

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://joseanthony-dev.github.io/portfolio/
          budgetPath: .github/lighthouse-budget.json
          uploadArtifacts: true
