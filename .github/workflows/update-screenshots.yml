name: Update Visual Regression Screenshots

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-screenshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate reference screenshots
        run: npx playwright test --update-snapshots

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: reference-screenshots
          path: tests/screenshots/
          retention-days: 30

      - name: Commit screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/screenshots/
          git diff --cached --quiet || git commit -m "chore: update visual regression reference screenshots"
          git push
