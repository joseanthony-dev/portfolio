    <nav class="breadcrumb" aria-label="Fil d'Ariane">

    </nav>
    <div class="section-title">
      <h1 class="h1" style="font-size:1.35rem;">Contact</h1>
      <p>Réponse rapide : mail ou LinkedIn</p>
    </div>

    <div class="card fade-in">
      <div class="inline-links">
        <a class="btn" href="mailto:anthony.jose@outlook.fr"><span aria-hidden="true">📧</span> anthony.jose@outlook.fr</a>
        <a class="btn" href="https://www.linkedin.com/in/joseanthony-zacharias" target="_blank" rel="noopener"><span aria-hidden="true">🔗</span> LinkedIn</a>
        <a class="btn" href="https://github.com/joseanthony-dev" target="_blank" rel="noopener"><span aria-hidden="true">💻</span> GitHub</a>
      </div>

      <div class="hr"></div>

	<form class="form" action="https://formspree.io/f/xvzaavle" method="POST">

	<div class="field">
  <input type="text" id="name" class="input" name="name" placeholder=" " required minlength="2" maxlength="100" pattern="[A-Za-zÀ-ÿ\s\-']+" title="Lettres, espaces, tirets et apostrophes uniquement" autocomplete="name" aria-describedby="name-error" />
  <label for="name">Nom</label>
  <span class="field-error" id="name-error"></span>
</div>

<div class="field">
  <input id="email" class="input" name="email" placeholder=" " type="email" required autocomplete="email" aria-describedby="email-error" />
  <label for="email">Email</label>
  <span class="field-error" id="email-error"></span>
</div>

<div class="field">
  <input type="text" id="subject" class="input" name="subject" placeholder=" " required minlength="3" maxlength="200" aria-describedby="subject-error" />
  <label for="subject">Sujet</label>
  <span class="field-error" id="subject-error"></span>
</div>

<div class="field">
  <textarea id="message" name="message" placeholder=" " required minlength="10" maxlength="5000" aria-describedby="message-error"></textarea>
  <label for="message">Message</label>
  <span class="field-error" id="message-error"></span>
</div>

  <!-- anti-spam -->
  <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off" aria-hidden="true" aria-label="Ne pas remplir">

  <button class="btn primary" type="submit" id="submit-btn">Envoyer</button>
</form>
<p id="sent" class="note" style="display:none;"></p>
<script>
  var messages = {
    name: "Veuillez entrer votre nom (2 caractères min., lettres, espaces, tirets et apostrophes uniquement)",
    email: "Veuillez entrer une adresse email valide (ex. : nom@exemple.fr)",
    subject: "Veuillez préciser un sujet (3 caractères minimum)",
    message: "Veuillez rédiger votre message (10 caractères minimum)"
  };

  document.querySelectorAll(".form .input, .form textarea").forEach(function (input) {
    function validate() {
      var error = document.getElementById(input.id + "-error");
      if (!error) return;
      if (input.value.trim() === "") {
        error.textContent = "";
        error.classList.remove("visible");
      } else if (!input.validity.valid) {
        error.textContent = messages[input.id] || "Champ invalide";
        error.classList.add("visible");
      } else {
        error.textContent = "";
        error.classList.remove("visible");
      }
    }
    input.addEventListener("blur", validate);
    input.addEventListener("input", validate);
  });

  document.querySelector(".form").addEventListener("submit", function (e) {
    e.preventDefault();
    var form = this;
    var firstInvalid = form.querySelector(":invalid");
    if (firstInvalid) {
      form.querySelectorAll(".input, textarea").forEach(function (input) {
        var error = document.getElementById(input.id + "-error");
        if (!error) return;
        if (!input.validity.valid) {
          error.textContent = messages[input.id] || "Champ invalide";
          error.classList.add("visible");
        }
      });
      firstInvalid.focus();
      return;
    }

    var btn = document.getElementById("submit-btn");
    var sent = document.getElementById("sent");
    btn.disabled = true;
    btn.textContent = "Envoi en cours\u2026";

    fetch(form.action, {
      method: "POST",
      body: new FormData(form),
      headers: { "Accept": "application/json" }
    }).then(function (res) {
      if (res.ok) {
        sent.innerHTML = "<b>Message envoy\u00e9 \u2705</b> Merci, je reviens vers vous rapidement.";
        sent.style.display = "block";
        sent.style.color = "";
        form.reset();
      } else {
        throw new Error("Erreur serveur");
      }
    }).catch(function () {
      sent.innerHTML = "<b>Erreur \u274c</b> Le message n'a pas pu \u00eatre envoy\u00e9. R\u00e9essayez ou contactez-moi par mail.";
      sent.style.display = "block";
      sent.style.color = getComputedStyle(document.documentElement).getPropertyValue("--error").trim();
    }).finally(function () {
      btn.disabled = false;
      btn.textContent = "Envoyer";
    });
  });
</script>
