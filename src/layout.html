<!doctype html>
<html lang="{{lang}}">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="{{csp}}">
  <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()">
  <meta name="referrer" content="strict-origin-when-cross-origin">
{{head_middle}}  <style>
    :root{--bg:#0b1220;--card:#0f1a2f;--text:#e8eefc;--muted:#a9b6d6;--border:rgba(255,255,255,.08);--radius:1rem;--max:87.5rem;--accent:#79b8ff;--accent2:#a78bfa;--nav-bg:rgba(11,18,32,.6);--menu-bg:rgba(15,26,47,.98);--grad1:rgba(121,184,255,.18);--grad2:rgba(167,139,250,.15);--grad3:rgba(34,211,238,.08);--subtle:rgba(255,255,255,.03);--btn-primary-border:rgba(121,184,255,.35);--btn-primary-bg:linear-gradient(135deg,rgba(121,184,255,.22),rgba(167,139,250,.18));--shadow:0 .75rem 2.2rem rgba(0,0,0,.35);--success:#2ecc71;--success-light:rgba(46,204,113,.3);--success-bg:rgba(46,204,113,.08);--error:#e74c3c}
    [data-theme="light"]{--bg:#f4f6fb;--card:#fff;--text:#1a1a2e;--muted:#555e70;--border:rgba(0,0,0,.1);--shadow:0 .75rem 2.2rem rgba(0,0,0,.08);--accent:#2563eb;--accent2:#7c3aed;--nav-bg:rgba(244,246,251,.75);--menu-bg:rgba(255,255,255,.98);--grad1:rgba(37,99,235,.1);--grad2:rgba(124,58,237,.08);--grad3:rgba(34,211,238,.05);--subtle:rgba(0,0,0,.03);--btn-primary-border:rgba(37,99,235,.3);--btn-primary-bg:linear-gradient(135deg,rgba(37,99,235,.12),rgba(124,58,237,.1));--success:#16a34a;--success-light:rgba(22,163,74,.3);--success-bg:rgba(22,163,74,.08);--error:#dc2626}
    *{box-sizing:border-box}html{scroll-behavior:smooth;scroll-padding-top:3.5rem}body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;color:var(--text);background:radial-gradient(62.5rem 37.5rem at 20% 10%,var(--grad1),transparent 60%),radial-gradient(56.25rem 31.25rem at 90% 30%,var(--grad2),transparent 55%),radial-gradient(56.25rem 31.25rem at 50% 100%,var(--grad3),transparent 50%),var(--bg);line-height:1.6}
    .loader{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity .4s ease}.loader.hidden{opacity:0;pointer-events:none}.loader-skeleton{width:min(90vw,50rem);display:flex;flex-direction:column;gap:1rem;padding:2rem}.skel{background:linear-gradient(90deg,var(--border) 25%,rgba(255,255,255,.06) 50%,var(--border) 75%);background-size:200% 100%;animation:shimmer 1.5s ease infinite;border-radius:.5rem}[data-theme="light"] .skel{background:linear-gradient(90deg,rgba(0,0,0,.06) 25%,rgba(0,0,0,.02) 50%,rgba(0,0,0,.06) 75%);background-size:200% 100%}.skel-nav{height:3rem;border-radius:.75rem}.skel-title{height:2rem;width:60%;margin-top:.5rem}.skel-text{height:1rem;width:85%}.skel-text-short{height:1rem;width:45%}.skel-card{height:8rem;border-radius:1rem}@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .skip-link{position:absolute;top:-100%;left:1rem;background:var(--accent);color:var(--bg);padding:.5rem 1rem;border-radius:var(--radius);font-weight:600;z-index:1000}.skip-link:focus{top:.75rem}
    .nav{position:sticky;top:0;z-index:50;backdrop-filter:blur(.75rem);background:var(--nav-bg);border-bottom:1px solid var(--border)}.nav-inner{display:flex;align-items:center;justify-content:space-between;max-width:var(--max);margin:0 auto;padding:.875rem 1.5rem;position:relative}
    .fade-in{opacity:0;transform:translateY(1.5rem);transition:opacity .5s ease,transform .5s ease}.fade-in.visible{opacity:1;transform:translateY(0)}
    .container{max-width:var(--max);margin:0 auto;padding:1.5rem 2.5rem}
    a{color:inherit;text-decoration:none;cursor:pointer}
    .menu-btn{display:none;background:transparent;border:1px solid var(--border);color:var(--text);padding:.5rem .625rem;border-radius:.625rem}
    .nav-links{display:flex;gap:1.125rem;align-items:center}
    .badge{display:inline-flex;align-items:center;gap:.5rem;padding:.375rem .625rem;border:1px solid var(--border);border-radius:999px;background:var(--subtle);color:var(--muted);font-size:.88rem}
  </style>
  <link rel="stylesheet" href="{{asset_prefix}}assets/css/style.min.css" media="print" onload="this.media='all'">
{{preload}}  <noscript><link rel="stylesheet" href="{{asset_prefix}}assets/css/style.min.css"></noscript>
{{json_ld}}</head>
{{body_open}}
{{noscript_nav}}
{{loader}}
  <a class="skip-link" href="#main">{{skip_label}}</a>
  <div data-component="header"></div>

  {{content}}

  <div data-component="footer"></div>

  <button type="button" class="back-to-top" aria-label="{{back_to_top_label}}">&#8593;</button>
  <script src="{{asset_prefix}}assets/js/components.min.js"></script>
  <script src="{{asset_prefix}}assets/js/main.min.js"></script>
<script data-goatcounter="https://joseanthony.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
